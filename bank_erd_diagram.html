<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  BANK ||--o{ BRANCH : has
  BRANCH ||--o{ ASSET : monitors
  BRANCH ||--o{ EMPLOYEE : employs
  EMPLOYEE ||--o| DEPENDENT : has
  CUSTOMER ||--o{ ACCOUNT : owns
  ACCOUNT ||--o{ TRANSACTION : records
  CUSTOMER }o--o{ LOAN : takes
  BRANCH ||--o{ LOAN : originates
  ACCOUNT }|--|| CHECKING_ACCOUNT : "is a"
  ACCOUNT }|--|| SAVINGS_ACCOUNT : "is a"
  CUSTOMER }|--|| REGULAR_CUSTOMER : "is a"
  CUSTOMER }|--|| BUSINESS_CUSTOMER : "is a"
  BUSINESS_CUSTOMER }o--o{ VALUED_CUSTOMER : categorizes
  
  BANK {
    string name PK
    string city
  }
  
  BRANCH {
    string name PK
    string branch_number PK
    string city
  }
  
  ASSET {
    int asset_id PK
    string asset_type
    decimal value
    string branch_name FK
  }
  
  CUSTOMER {
    string customer_id PK
    string name
    string address
    string telephone
    string city
  }
  
  REGULAR_CUSTOMER {
    string customer_id PK_FK
  }
  
  BUSINESS_CUSTOMER {
    string customer_id PK_FK
  }
  
  VALUED_CUSTOMER {
    string business_customer_id FK
    boolean is_valued
    string privileges
  }
  
  ACCOUNT {
    string account_number PK
    decimal balance
    date last_access_date
    string customer_id FK
  }
  
  CHECKING_ACCOUNT {
    string account_number PK_FK
    decimal overdraft_amount
  }
  
  SAVINGS_ACCOUNT {
    string account_number PK_FK
    decimal interest_rate
  }
  
  TRANSACTION {
    int transaction_id PK
    date transaction_date
    string account_number FK
  }
  
  EMPLOYEE {
    string employee_id PK
    string employee_name
    string employee_address
    string telephone
    string skills
    date start_date
    string branch_name FK
  }
  
  DEPENDENT {
    int dependent_id PK
    string dependent_name
    string telephone
    string address
    string relation
    string employee_id FK
  }
  
  LOAN {
    string loan_number PK
    decimal loan_amount
    decimal total_payments
    string customer_id FK
    string branch_name FK
  }
`);
document.getElementById('erd').innerHTML = svg;

// Round entity box corners
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

// Strip borders from attribute rows
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
